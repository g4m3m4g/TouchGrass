<div class="auth-container">
  <div class="glass-auth-card">
    <div class="auth-header">
      <h2>ยินดีต้อนรับกลับมา</h2>
      <p>เข้าสู่ระบบเพื่อจัดการเป้าหมายชีวิตของคุณ</p>
    </div>

    @if (errorMessage) {
      <div class="error-toast">⚠️ {{ errorMessage }}</div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">อีเมล</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="example@test.com"
          [ngClass]="{
            'input-error': loginForm.get('email')?.touched && loginForm.get('email')?.invalid,
          }"
        />
      </div>

      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="••••••••"
          [ngClass]="{
            'input-error': loginForm.get('password')?.touched && loginForm.get('password')?.invalid,
          }"
        />
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn-submit">
        @if (isLoading) {
          กำลังตรวจสอบข้อมูล...
        } @else {
          เข้าสู่ระบบ
        }
      </button>
    </form>

    <div class="auth-footer">
      <p>ยังไม่มีบัญชีผู้ใช้? <a routerLink="/register">สมัครสมาชิกที่นี่</a></p>
    </div>
  </div>
</div>
