<div class="auth-container">
  <div class="glass-auth-card">
    <div class="auth-header">
      <h2>สร้างบัญชีใหม่</h2>
      <p>เริ่มต้นวางแผนเป้าหมายชีวิตของคุณวันนี้</p>
    </div>

    @if (errorMessage) {
      <div class="error-toast">⚠️ {{ errorMessage }}</div>
    }

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="username">ชื่อผู้ใช้งาน</label>
        <input
          type="text"
          id="username"
          formControlName="username"
          placeholder="Gamie"
          [ngClass]="{
            'input-error':
              registerForm.get('username')?.touched && registerForm.get('username')?.invalid,
          }"
        />
      </div>

      <div class="form-group">
        <label for="email">อีเมล</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="example@test.com"
          [ngClass]="{
            'input-error': registerForm.get('email')?.touched && registerForm.get('email')?.invalid,
          }"
        />
      </div>

      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="••••••••"
          [ngClass]="{
            'input-error':
              registerForm.get('password')?.touched && registerForm.get('password')?.invalid,
          }"
        />
      </div>

      <button type="submit" [disabled]="registerForm.invalid || isLoading" class="btn-submit">
        @if (isLoading) {
          กำลังบันทึกข้อมูล...
        } @else {
          สมัครสมาชิก
        }
      </button>
    </form>

    <div class="auth-footer">
      <p>มีบัญชีผู้ใช้แล้ว? <a routerLink="/login">เข้าสู่ระบบที่นี่</a></p>
    </div>
  </div>
</div>
